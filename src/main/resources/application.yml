spring:
  application:
    name: APIGATEWAY
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "https://nookly-frontend-hslj.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: account-service
          uri: https://your-account-service.onrender.com   # <-- CHANGE THIS
          predicates:
            - Path=/api/v1/auth/**,/api/v1/owner/**,/api/v1/user/**,/api/v1/admin/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

        - id: add-pg-service
          uri: https://your-add-pg-service.onrender.com    # <-- CHANGE THIS
          predicates:
            - Path=/api/pg-listings/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE


        - id: pg-details-service
          uri: https://your-pg-details-service.onrender.com  # <-- CHANGE THIS
          predicates:
            - Path=/pg/**,/addPGWithFiles,/my-pgs,/search
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE


        - id: inquiry-service
          uri: https://nookinquiry.onrender.com            # <-- already known
          predicates:
            - Path=/inquiry/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

server:
  port: ${PORT:8080}