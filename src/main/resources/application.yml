spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Account API
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/owner/**, /api/v1/user/**, /api/v1/admin/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

        # Add PG API
        - id: add-pg-service
          uri: lb://add-pg-service
          predicates:
            - Path=/api/pg-listings/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

        # PG Details API
        - id: pg-details-service
          uri: lb://pg-details-service
          predicates:
            - Path=/pg/**, /addPGWithFiles, /my-pgs, /search
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

        # Inquiry API
        - id: inquiry-service
          uri: lb://inquiry-service
          predicates:
            - Path=/inquiry/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      # Global CORS — allows localhost and your deployed frontend (via environment variable)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "${FRONTEND_URL:http://localhost:4200}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: ${PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    prefer-ip-address: false